<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fovabera — Privacy Policy, Terms of Service, KVKK" />
  <title>Fovabera — Legal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>🌱</text></svg>" />
  <style>
    :root {
      --bg: #0F1419;
      --bg-alt: #1A2027;
      --surface: #232B33;
      --primary: #1D9E75;
      --primary-light: #5DCAA5;
      --text: #E8EDF1;
      --text-muted: #8B9AA5;
      --border: rgba(255,255,255,0.08);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FAFBFC;
        --bg-alt: #FFFFFF;
        --surface: #FFFFFF;
        --primary: #0F6E56;
        --primary-light: #1D9E75;
        --text: #1A2027;
        --text-muted: #6B7785;
        --border: rgba(0,0,0,0.08);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text",
                   Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .header { text-align: center; margin-bottom: 36px; }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon { font-size: 32px; }
    .logo-text {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo-text .brand { color: var(--secondary); }
    .logo-text .brand-accent { color: var(--primary-light); }
    .tagline {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 8px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px;
    }
    .card h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      text-align: center;
      color: var(--text);
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .doc-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.15s ease;
    }
    .doc-link:hover {
      border-color: var(--primary);
      color: var(--primary-light);
    }
    .doc-link .arrow {
      color: var(--text-muted);
      font-size: 18px;
    }
    .doc-link:hover .arrow { color: var(--primary-light); }
    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .footer a {
      color: var(--primary-light);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🌱</div>
      <div class="logo-text">
        <span class="brand">Fova</span><span class="brand-accent">b</span><span class="brand">era</span>
      </div>
    </div>
    <div class="tagline">For A Better Era.</div>
  </div>

  <div class="card">
    <h1>Legal Documents</h1>
    <div class="links">
      <a class="doc-link" href="privacy-en.html">
        <span>Privacy Policy (English)</span><span class="arrow">&rarr;</span>
      </a>
      <a class="doc-link" href="privacy-tr.html">
        <span>Gizlilik Politikas&#305; (T&#252;rk&#231;e)</span><span class="arrow">&rarr;</span>
      </a>
      <a class="doc-link" href="terms-en.html">
        <span>Terms of Service (English)</span><span class="arrow">&rarr;</span>
      </a>
      <a class="doc-link" href="terms-tr.html">
        <span>Kullan&#305;m &#350;artlar&#305; (T&#252;rk&#231;e)</span><span class="arrow">&rarr;</span>
      </a>
    </div>
  </div>

  <div class="footer">
    <p>
      &copy; 2026 Fovabera. All rights reserved.
      &nbsp;&middot;&nbsp;
      <a href="mailto:ataseversoftware@gmail.com">ataseversoftware@gmail.com</a>
    </p>
  </div>
</body>
</html>
